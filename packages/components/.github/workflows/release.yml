name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: release-production
  cancel-in-progress: true

# Manual-only release. Bumps the package patch version, tags it, and creates a
# GitHub release. The Pages workflow then redeploys production from that tag.

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci --ignore-scripts

      - name: Run syntax checks
        run: npm run check

      - name: Run full test suite
        run: |
          set -e
          npm test 2>&1 | tee "${RUNNER_TEMP}/npm-test.log"

      - name: Build showcase artifact
        env:
          SHOWCASE_BUILD_ENV: production
        run: npm run build:showcase

      - name: Verify package artifact
        run: npm pack --dry-run

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: npm-test-log
          path: ${{ runner.temp }}/npm-test.log
          retention-days: 7

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Compute next patch version
        id: next_version
        run: |
          CURRENT="$(node -p "require('./package.json').version")"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          if [[ -z "${MAJOR}" || -z "${MINOR}" || -z "${PATCH}" ]]; then
            echo "package.json version must be semantic version x.y.z; got '${CURRENT}'"
            exit 1
          fi

          LATEST_TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"
          LATEST_TAG_VERSION="${LATEST_TAG#v}"
          BASE_VERSION="$CURRENT"
          if [[ -n "$LATEST_TAG" ]]; then
            HIGHEST_VERSION="$(printf '%s\n%s\n' "$CURRENT" "$LATEST_TAG_VERSION" | sort -V | tail -n1)"
            BASE_VERSION="$HIGHEST_VERSION"
          fi
          IFS='.' read -r BASE_MAJOR BASE_MINOR BASE_PATCH <<< "$BASE_VERSION"

          NEXT="${BASE_MAJOR}.${BASE_MINOR}.$((BASE_PATCH + 1))"
          TAG="v${NEXT}"
          {
            echo "current=${CURRENT}"
            echo "base=${BASE_VERSION}"
            echo "latest_tag=${LATEST_TAG}"
            echo "version=${NEXT}"
            echo "tag=${TAG}"
          } >> "$GITHUB_OUTPUT"
          echo "Current version: ${CURRENT}"
          echo "Latest tag: ${LATEST_TAG:-none}"
          echo "Base version: ${BASE_VERSION}"
          echo "Next version: ${NEXT}"

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.next_version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists on origin."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump package version, commit, tag, and push
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          NEXT="${{ steps.next_version.outputs.version }}"
          TAG="${{ steps.next_version.outputs.tag }}"

          npm version "${NEXT}" --no-git-tag-version

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json

          if git diff --cached --quiet; then
            echo "Package version already set to ${NEXT}; tagging current commit."
          else
            git commit -m "chore(release): bump version to ${TAG}"
          fi

          git tag "${TAG}"
          git push origin HEAD:main "${TAG}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.next_version.outputs.tag }}"
          if gh release view "$TAG" --json tagName >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; updating metadata."
            gh release edit "$TAG" --title "$TAG" --latest
          else
            echo "Creating release ${TAG}."
            gh release create "$TAG" --generate-notes --title "$TAG" --latest
          fi
