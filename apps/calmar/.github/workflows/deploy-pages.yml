name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# LNM specifics: we DO NOT ship model weights with the deploy. The
# orchestrator fetches every ONNX model + atlas + connectome from
# Hugging Face on demand and caches them client-side via the Cache
# Storage API. The Pages artifact only needs to ship:
#   - web/index.html + web/js + web/css
#   - The ONNX Runtime WASM binaries (downloaded by setup.sh)
#   - web/models/manifest.json (asset registry)
# So no LFS, no on-disk model verification step.

jobs:
  build-production:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check out latest release tag
        run: |
          git fetch --force --tags origin
          TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"
          if [[ -n "$TAG" ]]; then
            echo "Building production from ${TAG}."
            git checkout "$TAG"
          else
            echo "No release tag found; building production from main."
            git checkout origin/main
          fi

      - name: Write build-info.json (production)
        run: |
          SHA="$(git rev-parse --short HEAD)"
          TAG="$(git describe --tags --exact-match 2>/dev/null || true)"
          BRANCH="${TAG:-detached}"
          cat > web/build-info.json <<EOF
          {
            "sha": "${SHA}",
            "branch": "${BRANCH}",
            "dirty": false,
            "buildEnv": "production"
          }
          EOF
          cat web/build-info.json

      - name: Download ONNX Runtime WASM files
        run: |
          cd web
          bash setup.sh

      - name: Verify ONNX Runtime WASM binaries
        run: |
          python3 - <<'PY'
          from pathlib import Path

          # ORT WASM bundle is the only weight-class artifact we ship in
          # the deploy. Models live on Hugging Face and are fetched at
          # runtime; verifying them here would always fail. setup.sh
          # downloads the bundle into web/wasm/.
          ort_dir = Path("web/wasm")
          if not ort_dir.exists():
              raise SystemExit(f"{ort_dir} not found — did web/setup.sh run?")
          wasms = list(ort_dir.glob("ort-wasm*.wasm"))
          if not wasms:
              raise SystemExit(f"No ort-wasm*.wasm files in {ort_dir}")
          for w in wasms:
              size = w.stat().st_size
              if size < 1_000_000:
                  raise SystemExit(f"{w} unexpectedly small: {size} bytes")
              print(f"OK {w} ({size:,} bytes)")
          PY

      - name: Upload production artifact
        uses: actions/upload-artifact@v7
        with:
          name: production-build
          path: web
          retention-days: 1

  build-staging:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Mark staging build version
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BASE_VERSION="$(bash scripts/get_version.sh)"
          STAGING_VERSION="${BASE_VERSION}-staging+${SHORT_SHA}"
          sed -i -E "s/^export const VERSION = '[^']+';$/export const VERSION = '${STAGING_VERSION}';/" web/js/app/config.js
          echo "Building staging as ${STAGING_VERSION}."

      - name: Write build-info.json (staging)
        run: |
          SHA="$(git rev-parse --short HEAD)"
          BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          cat > web/build-info.json <<EOF
          {
            "sha": "${SHA}",
            "branch": "${BRANCH}",
            "dirty": false,
            "buildEnv": "staging"
          }
          EOF
          cat web/build-info.json

      - name: Download ONNX Runtime WASM files
        run: |
          cd web
          bash setup.sh

      - name: Upload staging artifact
        uses: actions/upload-artifact@v7
        with:
          name: staging-build
          path: web
          retention-days: 1

  deploy:
    needs: [build-production, build-staging]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download production build
        uses: actions/download-artifact@v8
        with:
          name: production-build
          path: deploy-root

      - name: Download staging build
        uses: actions/download-artifact@v8
        with:
          name: staging-build
          path: deploy-root/staging

      - name: Inject staging banner
        run: |
          sed -i 's|<body>|<body><div style="background:#f59e0b;color:#000;text-align:center;padding:6px;font-size:13px;font-weight:600;z-index:9999;position:relative;">⚠ STAGING — This is a preview version. <a href="../" style="color:#000;text-decoration:underline;">Go to production</a></div>|' deploy-root/staging/index.html

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: deploy-root

      - id: deployment
        uses: actions/deploy-pages@v5
