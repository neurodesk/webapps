name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# MuscleMap ships its ONNX models with the Pages artifact, while
# setup.sh downloads the ONNX Runtime WASM bundle at deploy time.
# The deploy root serves the latest production release tag, and
# /staging serves the current main branch for preview.

jobs:
  build-production:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check out latest release tag
        run: |
          git fetch --force --tags origin
          TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"
          if [[ -n "$TAG" ]]; then
            echo "Building production from ${TAG}."
            git checkout "$TAG"
          else
            echo "No release tag found; building production from main."
            git checkout origin/main
          fi

      - name: Write build-info.json (production)
        run: |
          SHA="$(git rev-parse --short HEAD)"
          TAG="$(git describe --tags --exact-match 2>/dev/null || true)"
          BRANCH="${TAG:-detached}"
          cat > web/build-info.json <<EOF
          {
            "sha": "${SHA}",
            "branch": "${BRANCH}",
            "dirty": false,
            "buildEnv": "production"
          }
          EOF
          cat web/build-info.json

      - name: Download ONNX Runtime WASM files
        run: |
          cd web
          bash setup.sh

      - name: Verify deploy binaries
        run: |
          python3 - <<'PY'
          from pathlib import Path

          model_dir = Path("web/models")
          models = sorted(model_dir.glob("*.onnx"))
          if not models:
              raise SystemExit(f"No ONNX model files in {model_dir}")
          for model in models:
              size = model.stat().st_size
              with model.open("rb") as f:
                  head = f.read(64)
              if head.startswith(b"version https://git-lfs.github.com/spec"):
                  raise SystemExit(f"{model} is a Git LFS pointer, not a model binary")
              if size < 1_000_000:
                  raise SystemExit(f"{model} unexpectedly small: {size} bytes")
              print(f"OK {model} ({size:,} bytes)")

          ort_dir = Path("web/wasm")
          required_ort_files = {
              "ort.webgpu.min.js": 100_000,
              "ort-wasm-simd-threaded.mjs": 1_000,
              "ort-wasm-simd-threaded.wasm": 1_000_000,
              "ort-wasm-simd-threaded.jsep.mjs": 1_000,
              "ort-wasm-simd-threaded.jsep.wasm": 1_000_000,
          }
          for filename, min_size in required_ort_files.items():
              path = ort_dir / filename
              if not path.exists():
                  raise SystemExit(f"{path} not found")
              size = path.stat().st_size
              if size < min_size:
                  raise SystemExit(f"{path} unexpectedly small: {size} bytes")
              print(f"OK {path} ({size:,} bytes)")
          PY

      - name: Upload production artifact
        uses: actions/upload-artifact@v7
        with:
          name: production-build
          path: web
          retention-days: 1

  build-staging:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Mark staging build version
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BASE_VERSION="$(bash scripts/get_version.sh)"
          STAGING_VERSION="${BASE_VERSION}-staging+${SHORT_SHA}"
          sed -i -E "s/^export const VERSION = '[^']+';$/export const VERSION = '${STAGING_VERSION}';/" web/js/app/config.js
          echo "Building staging as ${STAGING_VERSION}."

      - name: Write build-info.json (staging)
        run: |
          SHA="$(git rev-parse --short HEAD)"
          BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          cat > web/build-info.json <<EOF
          {
            "sha": "${SHA}",
            "branch": "${BRANCH}",
            "dirty": false,
            "buildEnv": "staging"
          }
          EOF
          cat web/build-info.json

      - name: Download ONNX Runtime WASM files
        run: |
          cd web
          bash setup.sh

      - name: Verify deploy binaries
        run: |
          python3 - <<'PY'
          from pathlib import Path

          model_dir = Path("web/models")
          models = sorted(model_dir.glob("*.onnx"))
          if not models:
              raise SystemExit(f"No ONNX model files in {model_dir}")
          for model in models:
              size = model.stat().st_size
              with model.open("rb") as f:
                  head = f.read(64)
              if head.startswith(b"version https://git-lfs.github.com/spec"):
                  raise SystemExit(f"{model} is a Git LFS pointer, not a model binary")
              if size < 1_000_000:
                  raise SystemExit(f"{model} unexpectedly small: {size} bytes")
              print(f"OK {model} ({size:,} bytes)")

          ort_dir = Path("web/wasm")
          required_ort_files = {
              "ort.webgpu.min.js": 100_000,
              "ort-wasm-simd-threaded.mjs": 1_000,
              "ort-wasm-simd-threaded.wasm": 1_000_000,
              "ort-wasm-simd-threaded.jsep.mjs": 1_000,
              "ort-wasm-simd-threaded.jsep.wasm": 1_000_000,
          }
          for filename, min_size in required_ort_files.items():
              path = ort_dir / filename
              if not path.exists():
                  raise SystemExit(f"{path} not found")
              size = path.stat().st_size
              if size < min_size:
                  raise SystemExit(f"{path} unexpectedly small: {size} bytes")
              print(f"OK {path} ({size:,} bytes)")
          PY

      - name: Upload staging artifact
        uses: actions/upload-artifact@v7
        with:
          name: staging-build
          path: web
          retention-days: 1

  deploy:
    needs: [build-production, build-staging]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download production build
        uses: actions/download-artifact@v8
        with:
          name: production-build
          path: deploy-root

      - name: Download staging build
        uses: actions/download-artifact@v8
        with:
          name: staging-build
          path: deploy-root/staging

      - name: Inject staging banner
        run: |
          sed -i 's|<body>|<body><div style="background:#f59e0b;color:#000;text-align:center;padding:6px;font-size:13px;font-weight:600;z-index:9999;position:relative;">STAGING - This is a preview version. <a href="../" style="color:#000;text-decoration:underline;">Go to production</a></div>|' deploy-root/staging/index.html

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: deploy-root

      - id: deployment
        uses: actions/deploy-pages@v5
