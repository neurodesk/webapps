name: Full Test Suite

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-test-suite-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-test-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci --ignore-scripts

      - name: Download ONNX Runtime WASM files
        run: |
          cd web
          bash setup.sh

      - name: Run full test suite (lint, parity, controllers, UI, worker e2e + protocol)
        id: full_test_suite
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee "${RUNNER_TEMP}/npm-test.log"
          status="${PIPESTATUS[0]}"
          echo "log_path=${RUNNER_TEMP}/npm-test.log" >> "$GITHUB_OUTPUT"
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Summarize failed tests
        id: test_failure_summary
        if: failure() && steps.full_test_suite.outcome == 'failure'
        env:
          TEST_EXIT_CODE: ${{ steps.full_test_suite.outputs.exit_code }}
          TEST_LOG_PATH: ${{ steps.full_test_suite.outputs.log_path }}
        run: node scripts/summarize_test_failures.cjs "$TEST_LOG_PATH" | tee "$GITHUB_STEP_SUMMARY"
