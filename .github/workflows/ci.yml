name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate the seven-app registry
        run: pnpm test:registry
      - name: Lint every workspace package
        run: pnpm lint

  app-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - musclemap
          - vesselboost
          - spinalcordtoolbox
          - calmar
          - qsmbly
          - seedseg
          - dicompare
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Test ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.app }} test

  composite-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Build the composite site
        run: pnpm build
      - name: Reject embedded models and oversized assets
        run: pnpm audit:artifacts
      - name: Smoke test every deployed subpath
        run: pnpm test:smoke

  shared-component-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [musclemap, vesselboost, spinalcordtoolbox, calmar]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Test shared-component integration in ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.app }} test:e2e
