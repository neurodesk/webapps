name: release-apps

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neurodesk-webapps-release
  cancel-in-progress: false

# All app tags point to the same validated monorepo commit. Each GitHub release
# carries a self-contained browser bundle for its app; model weights remain on
# Hugging Face and are fetched at runtime.
jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run all unit and integration tests
        run: pnpm test
      - name: Lint every workspace package
        run: pnpm lint
      - name: Build the composite site
        run: pnpm build
      - name: Reject embedded models and oversized assets
        run: pnpm audit:artifacts
      - name: Smoke test every deployed subpath
        run: pnpm test:smoke
      - name: Test shared-component browser integrations
        run: |
          pnpm --filter musclemap test:e2e
          pnpm --filter vesselboost test:e2e
          pnpm --filter spinalcordtoolbox test:e2e
          pnpm --filter calmar test:e2e
      - uses: actions/upload-artifact@v4
        with:
          name: composite-site
          path: dist
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build-and-verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: musclemap
            path: musclemap
          - app: vesselboost
            path: vesselboost
          - app: spinalcordtoolbox
            path: sct
          - app: calmar
            path: calmar
          - app: qsmbly
            path: qsmbly
          - app: seedseg
            path: seedseg
          - app: dicompare
            path: dicompare
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: composite-site
          path: dist
      - name: Create app release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP: ${{ matrix.app }}
          APP_PATH: ${{ matrix.path }}
        run: |
          VERSION="$(node -p "require('./apps/${APP}/package.json').version")"
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version for ${APP}: ${VERSION}"
            exit 1
          fi

          TAG="${APP}-v${VERSION}"
          ARCHIVE="${APP}-${VERSION}-web.zip"
          (cd "dist/${APP_PATH}" && zip -qr "${GITHUB_WORKSPACE}/${ARCHIVE}" .)

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; replacing its browser bundle."
            gh release upload "${TAG}" "${ARCHIVE}" --clobber
          else
            gh release create "${TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${APP} v${VERSION}" \
              --generate-notes \
              "${ARCHIVE}"
          fi
